<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Dosen - AbsensiKu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #f8fafc;
            color: #334155;
            display: flex;
            min-height: 100vh;
            padding: 24px;
            gap: 24px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: #0f172a;
            color: white;
            padding: 32px 24px;
            border-radius: 24px;
            flex-shrink: 0;
        }

        .logo {
            margin-bottom: 48px;
            padding-left: 8px;
        }

        .logo h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: #94a3b8;
            padding: 14px 16px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .menu a:hover,
        .menu a.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .menu a.active {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .summary-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .summary-card h3 {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
        }

        .summary-card p {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin-top: 8px;
        }

        .panel-box {
            background: white;
            padding: 28px;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .notification-item {
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #475569;
        }

        .jadwal-card {
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            border-left: 6px solid #3b82f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            transition: 0.3s;
        }

        .jadwal-card:hover {
            transform: translateX(5px);
        }

        .btn-absen {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-detail {
            background: #e2e8f0;
            color: #475569;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">
            <h2>AbsensiKu</h2>
        </div>
        <div class="menu">
            <a href="#" class="active">🏠 Dashboard</a>
            <a href="#">👨‍🎓 Data Mahasiswa</a>
            <a href="#">📅 Isi Absensi</a>
            <a href="#">📊 Laporan Grafik</a>
        </div>
    </div>

    <div class="main-content">
        <h1>Dashboard Dosen</h1>
        <p id="tanggal-text">Halo, Dosen. Selamat bekerja hari ini.</p>

        <div class="dashboard-grid">
            <div class="summary-card">
                <h3>Kelas Hari Ini</h3>
                <p id="total-kelas">0</p>
            </div>
            <div class="summary-card">
                <h3>Total Mahasiswa</h3>
                <p>120</p>
            </div>
            <div class="summary-card">
                <h3>Tingkat Kehadiran</h3>
                <p>92%</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
            <div class="panel-box">
                <h2 style="margin-bottom: 20px;">Jadwal Kuliah Hari Ini (<span id="hari-ini"></span>)</h2>
                <div id="container-jadwal">
                </div>
            </div>

            <div class="panel-box">
                <h2 style="font-size: 18px; margin-bottom: 20px;">Info Penting</h2>
                <div class="notification-item">🔔 3 Permohonan izin mahasiswa</div>
                <div class="notification-item">⚠️ Deadline nilai UTS: 2 hari</div>
            </div>
        </div>
    </div>

    <script>
        // Data Jadwal Per Hari
        const jadwalData = {
            "Wednesday": [ // Rabu
                { matkul: "Pemrograman Web Lanjut", jam: "08:00 - 10:30", ruang: "Lab Komputer A", type: "absen" },
                { matkul: "Basis Data Terdistribusi", jam: "13:00 - 15:30", ruang: "Ruang Teori 3", type: "detail" }
            ],
            "Monday": [ // Senin
                { matkul: "Algoritma Pemrograman", jam: "09:00 - 11:30", ruang: "Lab B", type: "absen" }
            ]
        };

        const hariInggris = new Date().toLocaleDateString('en-US', { weekday: 'long' });
        const namaHari = new Date().toLocaleDateString('id-ID', { weekday: 'long' });

        document.getElementById('hari-ini').innerText = namaHari;

        const container = document.getElementById('container-jadwal');
        const jadwalHariIni = jadwalData[hariInggris];

        if (jadwalHariIni) {
            document.getElementById('total-kelas').innerText = jadwalHariIni.length;
            jadwalHariIni.forEach(j => {
                container.innerHTML += `
                    <div class="jadwal-card" style="border-left-color: ${j.type === 'absen' ? '#3b82f6' : '#cbd5e1'}">
                        <div>
                            <span style="font-size: 12px; font-weight: 700; color: #3b82f6;">${j.jam}</span>
                            <h3 style="font-size: 16px; margin: 4px 0;">${j.matkul}</h3>
                            <p style="font-size: 13px; color: #64748b;">${j.ruang}</p>
                        </div>
                        <button class="${j.type === 'absen' ? 'btn-absen' : 'btn-detail'}">
                            ${j.type === 'absen' ? 'Absensi' : 'Detail'}
                        </button>
                    </div>
                `;
            });
        } else {
            container.innerHTML = `<p style="color: #64748b;">Tidak ada jadwal kuliah untuk hari ini. Selamat beristirahat!</p>`;
        }
    </script>
</body>

</html>

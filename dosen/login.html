<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Dosen - AkademiKu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e0f0ff 0%, #b0d4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 480px;
    }

    .login-card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -10px rgba(0, 50, 100, 0.2);
      padding: 2rem 1.8rem 2.2rem;
      transition: transform 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-4px);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      background: #1e6ef0;
      width: 70px;
      height: 70px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 8px 18px rgba(30, 110, 240, 0.25);
    }

    .logo-icon svg {
      width: 40px;
      height: 40px;
      stroke: white;
      stroke-width: 1.5;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0a2b4e;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: #3b6e9e;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #0a3a5e;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      border: 2px solid #e2edf7;
      border-radius: 28px;
      background: #fefeff;
      transition: all 0.2s;
      outline: none;
      color: #0b2b44;
    }

    input:focus {
      border-color: #1e6ef0;
      box-shadow: 0 0 0 3px rgba(30, 110, 240, 0.2);
    }

    .btn-login {
      width: 100%;
      background: #1e6ef0;
      border: none;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: white;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 10px;
      box-shadow: 0 4px 8px rgba(0, 80, 160, 0.2);
    }

    .btn-login:hover {
      background: #0a56cf;
    }

    .btn-login:active {
      transform: scale(0.97);
    }

    .info-note {
      text-align: center;
      font-size: 0.8rem;
      color: #4f7ea3;
      margin-top: 1.6rem;
      border-top: 1px solid #e3eef9;
      padding-top: 1.2rem;
    }

    .demo-account {
      margin-top: 1rem;
      padding: 12px;
      background: #f0f7ff;
      border-radius: 12px;
      font-size: 0.85rem;
    }

    .demo-account p {
      margin: 4px 0;
      color: #1a4b7a;
    }

    .demo-account strong {
      color: #1e6ef0;
    }

    @media (max-width: 500px) {
      .login-card {
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <h1>AkademiKu</h1>
        <div class="subtitle">Login Sistem Dosen</div>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Masukkan ID dosen" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button class="btn-login" type="submit">Masuk ke Dashboard</button>
      </form>

      <!-- Info Akun Demo Dosen
      <div class="demo-account">
        <p><strong>📌 Akun Dosen:</strong></p>
        <p>👨‍🏫 budi / 12345 → Pemrograman Web (MK301)</p>
        <p>👩‍🏫 rina / 12345 → Basis Data (MK201)</p>
        <p>👨‍🏫 andi / 12345 → Pemrograman Mobile (MK401) &amp; Algoritma (MK101)</p>
      </div> -->

      <div class="info-note">
        © 2026 | Sistem Kehadiran
      </div>
    </div>
  </div>

  <script>
    // ===== DATA 3 DOSEN =====
    const dosen = [
      {
        username: "budi",
        password: "12345",
        nama: "Budi Santoso, S.Kom., M.Kom.",
        matkul: ["Pemrograman Web"],
        kodeMK: ["MK301"],
        kelas: ["A", "B", "C"],
        semester: [5, 6]
      },
      {
        username: "rina",
        password: "12345",
        nama: "Rina Kartika, S.Si., M.T.",
        matkul: ["Basis Data"],
        kodeMK: ["MK201"],
        kelas: ["A", "B", "C"],
        semester: [3, 4]
      },
      {
        username: "andi",
        password: "12345",
        nama: "Andi Saputra, S.Kom., M.Cs.",
        matkul: ["Pemrograman Mobile", "Algoritma Pemrograman"],
        kodeMK: ["MK401", "MK101"],
        kelas: ["A", "B", "C"],
        semester: [1, 2, 3, 4]
      }
    ];

    function handleLogin(e) {
      e.preventDefault();
      let username = document.getElementById("username").value.trim().toLowerCase();
      let password = document.getElementById("password").value;
      let akun = dosen.find(d => d.username === username && d.password === password);

      if (akun) {
        // Simpan kodeMK pertama sebagai default, tapi tetap simpan array lengkap
        akun.kodeMK = akun.kodeMK[0] || "MK000";
        localStorage.setItem("dosenLogin", JSON.stringify(akun));
        window.location.href = "dashboard.html";
      } else {
        alert("Username atau password salah!");
      }
    }
  </script>
</body>

</html>

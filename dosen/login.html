<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Dosen - AbsensiKu</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Gradasi lebih tenang dan modern */
      background: linear-gradient(135deg, #f0f4ff 0%, #e2e8f0 100%);
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 40px;
      /* Shadow yang lebih lembut dan elegan */
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .brand {
      text-align: center;
      margin-bottom: 35px;
    }

    .brand h1 {
      font-size: 28px;
      color: #1e293b;
      font-weight: 700;
    }

    .brand p {
      color: #64748b;
      font-size: 14px;
      margin-top: 5px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 2px solid #f1f5f9;
      background: #f8fafc;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      border-color: #3b82f6;
      background: #ffffff;
      outline: none;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: #0f172a;
      /* Hitam elegan */
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-login:hover {
      background: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px rgba(15, 23, 42, 0.2);
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="brand">
      <h1>AbsensiKu</h1>
      <p>Login Sistem Dosen</p>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan ID dosen" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button class="btn-login" type="submit">Masuk ke Dashboard</button>
    </form>

    <div class="footer">
      © 2026 | Sistem Kehadiran
    </div>
  </div>

  <script>
    const dosen = [
  {
    username: "andi",
    password: "123",
    nama: "Andi Saputra",
    matkul: ["Algoritma Pemrograman", "Struktur Data"],
    semester: [1, 2]
  },
  {
    username: "rina",
    password: "123",
    nama: "Rina Kartika",
    matkul: ["Basis Data"],
    semester: [3, 4]
  },
  {
    username: "budi",
    password: "123",
    nama: "Budi Santoso",
    matkul: ["Pemrograman Web"],
    semester: [5, 6]
  }
];

    function handleLogin(e) {
      e.preventDefault();
      let username = document.getElementById("username").value.trim().toLowerCase();
      let password = document.getElementById("password").value;
      let akun = dosen.find(d => d.username === username && d.password === password);

      if (akun) {
        localStorage.setItem("dosenLogin", JSON.stringify(akun));
        window.location.href = "dashboard.html";
      } else {
        alert("Username atau password salah!");
      }
    }
  </script>

</body>

</html>

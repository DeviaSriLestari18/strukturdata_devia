<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Dosen | Absensi Terintegrasi</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f4f7fc;
      display: flex;
      min-height: 100vh;
      padding: 24px;
      gap: 24px;
    }

    .sidebar {
      width: 270px;
      background: white;
      border-radius: 32px;
      padding: 28px 20px;
      box-shadow: 0 15px 40px -12px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #0b1e33;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      color: #5a6b7c;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      border-radius: 18px;
      transition: 0.2s;
      text-decoration: none;
    }

    .menu-item:hover {
      background: #f0f5ff;
      color: #2a6df4;
    }

    .menu-item.active {
      background: #eef3fe;
      color: #2a6df4;
      font-weight: 600;
    }

    .menu-item.logout {
      margin-top: auto;
      color: #d1453b;
    }

    .menu-item.logout:hover {
      background: #fff0ee;
    }

    .sidebar-profile {
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, #f8fbff, #eef4ff);
      border-radius: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #e6eefc;
    }

    .sidebar-profile .avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #2a6df4, #5b8cff);
      color: white;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }

    .sidebar-profile .info h5 {
      font-size: 14px;
      font-weight: 600;
      color: #0b1e33;
    }

    .sidebar-profile .info p {
      font-size: 12px;
      color: #6f7f92;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #0b1e33;
    }

    .profile-chip {
      background: white;
      padding: 10px 22px 10px 18px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      border: 1px solid #edf2f7;
    }

    .profile-chip .avatar-mini {
      width: 34px;
      height: 34px;
      background: #2a6df4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .matkul-card {
      background: white;
      border-radius: 28px;
      padding: 24px 28px;
      box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.04);
      border: 1px solid #eef2f6;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .matkul-card .icon {
      width: 52px;
      height: 52px;
      background: #eef3fe;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .matkul-card .detail h3 {
      font-size: 18px;
      font-weight: 700;
      color: #0b1e33;
    }

    .matkul-card .detail p {
      color: #5a6b7c;
      font-size: 14px;
    }

    .matkul-card .badge {
      margin-left: auto;
      background: #eaf6ed;
      color: #1a8a4a;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .stat-box {
      background: white;
      padding: 20px 22px;
      border-radius: 24px;
      border: 1px solid #edf2f7;
    }

    .stat-box .label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #5a6b7c;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .stat-box .value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .stat-box .value.green {
      color: #1e9b50;
    }

    .stat-box .value.red {
      color: #d1453b;
    }

    .stat-box .value.amber {
      color: #c88a1a;
    }

    .stat-box .value.violet {
      color: #6d28d9;
    }

    .stat-box .value.blue {
      color: #0b1e33;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.04);
      border: 1px solid #eef2f6;
    }

    .filter-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    .filter-row select,
    .filter-row input {
      padding: 12px 18px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: #fafcff;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    .filter-row select:focus,
    .filter-row input:focus {
      border-color: #2a6df4;
      box-shadow: 0 0 0 3px rgba(42, 109, 244, 0.08);
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid #edf2f7;
      max-height: 500px;
      overflow-y: auto;
    }

    .radio-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .radio-item:hover {
      background: #f4f7fc;
    }

    .radio-item input {
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      color: #6f7f92;
      font-weight: 600;
      font-size: 13px;
      background: #f9fbfd;
      border-bottom: 1px solid #e6edf4;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f4f9;
      color: #1f2a3a;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .btn-action {
      background: #0b1e33;
      color: white;
      padding: 14px 32px;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: 0.2s;
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-action:hover {
      background: #1a2f48;
      transform: scale(1.01);
    }

    .pertemuan-box {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sort-indicator {
      font-size: 11px;
      color: #8a9aa8;
      margin-left: 4px;
    }

    @media (max-width:1024px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width:768px) {
      body {
        padding: 16px;
        gap: 16px;
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 20px;
      }

      .menu {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .sidebar-profile {
        display: none;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo"><span>🎓</span> AkademiKu</div>
    <div class="menu">
      <a href="dashboard.html" class="menu-item active">🏠 Dashboard</a>
      <a href="input.html" class="menu-item">📝 Input Nilai</a>
      <a href="laporan.html" class="menu-item">📊 Laporan Grafik</a>
      <div class="menu-item logout" onclick="logout()">🚪 Logout</div>
    </div>
    <div class="sidebar-profile" id="sidebarProfile">
      <div class="avatar" id="avatarInisial">D</div>
      <div class="info">
        <h5 id="sidebarNama">Dosen</h5>
        <p id="sidebarMatkul">Mata Kuliah</p>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="header">
      <h1>Dashboard Dosen</h1>
      <div class="profile-chip" id="profileChip">
        <div class="avatar-mini" id="chipInisial">D</div>
        <span id="chipNama">Dr. Dosen</span>
      </div>
    </div>

    <!-- MATA KULIAH CARD -->
    <div class="matkul-card">
      <div class="icon">📘</div>
      <div class="detail">
        <h3 id="matkulNama">Basis Data</h3>
        <p id="matkulKode">Kode: MK301 · SKS: 3</p>
      </div>
      <div class="badge">Semester Ganjil 2025/2026</div>
    </div>

    <!-- STATISTIK TOTAL -->
    <div class="stats">
      <div class="stat-box">
        <div class="label">👥 Total Mahasiswa</div>
        <div class="value blue" id="statTotal">0</div>
      </div>
      <div class="stat-box">
        <div class="label">✅ Hadir</div>
        <div class="value green" id="statHadir">0</div>
      </div>
      <div class="stat-box">
        <div class="label">🩺 Sakit</div>
        <div class="value violet" id="statSakit">0</div>
      </div>
      <div class="stat-box">
        <div class="label">📋 Izin</div>
        <div class="value amber" id="statIzin">0</div>
      </div>
      <div class="stat-box">
        <div class="label">❌ Alpha</div>
        <div class="value red" id="statAlpha">0</div>
      </div>
    </div>

    <!-- TABEL ABSENSI -->
    <div class="card">
      <div class="filter-row">
        <select id="kelas" onchange="loadMahasiswa()">
          <option value="">Pilih Kelas</option>
          <option value="A">Kelas A</option>
          <option value="B">Kelas B</option>
          <option value="C">Kelas C</option>
        </select>
        <div class="pertemuan-box">
          <label>Pertemuan ke-</label>
          <select id="pertemuan" onchange="loadMahasiswa()">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
          <label>Tanggal</label>
          <input type="date" id="tanggal" />
        </div>
        <input type="text" id="search" placeholder="Cari mahasiswa..." onkeyup="filterTable()" />
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>NIM</th>
              <th>Nama <span class="sort-indicator"></span></th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <button class="btn-action" onclick="simpan()">💾 Simpan Data Absensi</button>
    </div>
  </div>

  <script>
    // ===== DATA DOSEN =====
    const login = JSON.parse(localStorage.getItem("dosenLogin"));
    if (!login) {
      window.location.href = "login.html";
    }

    // Pastikan kodeMK tersedia
    if (!login.kodeMK) {
      login.kodeMK = login.kodeMK?.[0] || "MK301";
      localStorage.setItem("dosenLogin", JSON.stringify(login));
    }

    const inisial = login.nama.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

    // Isi profil
    document.getElementById('sidebarNama').innerText = login.nama;
    document.getElementById('sidebarMatkul').innerText = login.matkul?.[0] || 'Mata Kuliah';
    document.getElementById('avatarInisial').innerText = inisial;
    document.getElementById('chipNama').innerText = login.nama;
    document.getElementById('chipInisial').innerText = inisial;
    document.getElementById('matkulNama').innerText = login.matkul?.[0] || 'Pemrograman Web Lanjut';
    document.getElementById('matkulKode').innerText = 'Kode: ' + (login.kodeMK || 'MK301') + ' · SKS: 3';

    // ===== DATA MAHASISWA (LENGKAP 10 PER KELAS) =====
    const dataMhs = {
      A: [
        { nim: "20241001", nama: "Devia Sri Lestari" },
        { nim: "20241002", nama: "Rizki Rian Sopandi" },
        { nim: "20241003", nama: "Putri Maharani" },
        { nim: "20241004", nama: "Ahmad Fauzi" },
        { nim: "20241005", nama: "Nabila Putri" },
        { nim: "20241006", nama: "Fajar Nugraha" },
        { nim: "20241007", nama: "Dinda Aulia" },
        { nim: "20241008", nama: "Bagas Saputra" },
        { nim: "20241009", nama: "Siti Rahma" },
        { nim: "20241010", nama: "Yoga Pratama" }
      ],
      B: [
        { nim: "20242001", nama: "Aulia Rahman" },
        { nim: "20242002", nama: "Farah Nabila" },
        { nim: "20242003", nama: "Iqbal Maulana" },
        { nim: "20242004", nama: "Nadya Putri" },
        { nim: "20242005", nama: "Rafi Akbar" },
        { nim: "20242006", nama: "Tiara Maharani" },
        { nim: "20242007", nama: "Dimas Saputra" },
        { nim: "20242008", nama: "Maya Safitri" },
        { nim: "20242009", nama: "Andika Prasetyo" },
        { nim: "20242010", nama: "Salsa Putri" }
      ],
      C: [
        { nim: "20243001", nama: "Aisyah Khairunnisa" },
        { nim: "20243002", nama: "Bima Pratama" },
        { nim: "20243003", nama: "Cindy Amelia" },
        { nim: "20243004", nama: "Daffa Alfarizi" },
        { nim: "20243005", nama: "Evelyn Putri" },
        { nim: "20243006", nama: "Galih Permana" },
        { nim: "20243007", nama: "Hana Oktaviani" },
        { nim: "20243008", nama: "Kevin Prakoso" },
        { nim: "20243009", nama: "Luthfi Ramadhan" },
        { nim: "20243010", nama: "Nisa Aulia" }
      ]
    };

    const kodeMK = login.kodeMK || "MK301";

    // ===== SET TANGGAL HARI INI =====
    document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];

    // ===== FUNGSI SORTING A-Z =====
    function sortMahasiswa(data) {
      return data.sort((a, b) => a.nama.localeCompare(b.nama, 'id', { sensitivity: 'base' }));
    }

    // ===== LOAD MAHASISWA =====
    function loadMahasiswa() {
      const kelas = document.getElementById("kelas").value;
      const pertemuan = document.getElementById("pertemuan").value;
      const tbody = document.getElementById("tbody");
      tbody.innerHTML = "";

      if (!kelas || !dataMhs[kelas]) {
        document.getElementById("statTotal").innerText = "0";
        hitungStatistikTotal();
        return;
      }

      // Ambil data yang sudah tersimpan untuk pertemuan ini
      const key = `absensi_${kodeMK}_${kelas}_pertemuan${pertemuan}`;
      const dataPertemuan = JSON.parse(localStorage.getItem(key)) || {};

      // 🔥 SORTING A-Z berdasarkan NAMA
      const sortedData = sortMahasiswa([...dataMhs[kelas]]);

      sortedData.forEach(m => {
        const statusTersimpan = dataPertemuan[m.nim] || "Hadir";
        tbody.innerHTML += `<tr>
                    <td><strong>${m.nim}</strong></td>
                    <td>${m.nama}</td>
                    <td>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="status${m.nim}" value="Hadir" ${statusTersimpan === 'Hadir' ? 'checked' : ''}> Hadir</label>
                            <label class="radio-item"><input type="radio" name="status${m.nim}" value="Sakit" ${statusTersimpan === 'Sakit' ? 'checked' : ''}> Sakit</label>
                            <label class="radio-item"><input type="radio" name="status${m.nim}" value="Izin" ${statusTersimpan === 'Izin' ? 'checked' : ''}> Izin</label>
                            <label class="radio-item"><input type="radio" name="status${m.nim}" value="Alpha" ${statusTersimpan === 'Alpha' ? 'checked' : ''}> Alpha</label>
                        </div>
                    </td>
                </tr>`;
      });

      document.getElementById("statTotal").innerText = sortedData.length;
      hitungStatistikTotal();
    }

    // ===== HITUNG STATISTIK TOTAL =====
    function hitungStatistikTotal() {
      const stats = { Hadir: 0, Sakit: 0, Izin: 0, Alpha: 0 };
      const kelas = document.getElementById("kelas").value;
      if (!kelas || !dataMhs[kelas]) {
        document.getElementById("statHadir").innerText = "0";
        document.getElementById("statSakit").innerText = "0";
        document.getElementById("statIzin").innerText = "0";
        document.getElementById("statAlpha").innerText = "0";
        return;
      }

      const semuaNim = dataMhs[kelas].map(m => m.nim);

      for (let p = 1; p <= 16; p++) {
        const key = `absensi_${kodeMK}_${kelas}_pertemuan${p}`;
        const dataPertemuan = JSON.parse(localStorage.getItem(key)) || {};
        semuaNim.forEach(nim => {
          const status = dataPertemuan[nim];
          if (status && stats.hasOwnProperty(status)) stats[status]++;
        });
      }

      document.getElementById("statHadir").innerText = stats.Hadir;
      document.getElementById("statSakit").innerText = stats.Sakit;
      document.getElementById("statIzin").innerText = stats.Izin;
      document.getElementById("statAlpha").innerText = stats.Alpha;
    }

    // ===== SIMPAN DATA =====
    function simpan() {
      const kelas = document.getElementById("kelas").value;
      const pertemuan = document.getElementById("pertemuan").value;
      const tanggal = document.getElementById("tanggal").value;

      if (!kelas) {
        alert("Pilih kelas terlebih dahulu!");
        return;
      }
      if (!tanggal) {
        alert("Pilih tanggal!");
        return;
      }

      const dataPertemuan = {};
      document.querySelectorAll("#tbody tr").forEach(row => {
        const nim = row.cells[0].innerText.trim();
        const statusRadio = row.querySelector("input[type='radio']:checked");
        if (!statusRadio) return;
        dataPertemuan[nim] = statusRadio.value;
      });

      // 🔥 SIMPAN DENGAN KEY: absensi_{kodeMK}_{kelas}_pertemuan{p}
      const key = `absensi_${kodeMK}_${kelas}_pertemuan${pertemuan}`;
      localStorage.setItem(key, JSON.stringify(dataPertemuan));

      // Simpan meta data
      const metaKey = `absensi_${kodeMK}_${kelas}_pertemuan${pertemuan}_meta`;
      localStorage.setItem(metaKey, JSON.stringify({ tanggal, kelas, pertemuan }));

      console.log("✅ Data tersimpan:", key, dataPertemuan);
      hitungStatistikTotal();

      const btn = document.querySelector('.btn-action');
      btn.innerHTML = '✅ Disimpan!';
      setTimeout(() => btn.innerHTML = '💾 Simpan Data Absensi', 1200);

      alert(`✅ Data pertemuan ${pertemuan} untuk kelas ${kelas} berhasil disimpan!`);
    }

    // ===== FILTER TABLE =====
    function filterTable() {
      const input = document.getElementById("search").value.toLowerCase();
      document.querySelectorAll("#tbody tr").forEach(row => {
        const nim = row.cells[0]?.innerText.toLowerCase() || '';
        const nama = row.cells[1]?.innerText.toLowerCase() || '';
        row.style.display = (nim.includes(input) || nama.includes(input)) ? '' : 'none';
      });
    }

    function logout() {
      if (confirm("Apakah Anda yakin ingin keluar?")) {
        localStorage.removeItem("dosenLogin");
        window.location.href = "login.html";
      }
    }

    // ===== INISIALISASI =====
    window.onload = function () {
      document.getElementById("pertemuan").value = "1";
    };
  </script>
</body>

</html>

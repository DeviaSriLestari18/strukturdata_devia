<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkademiKu | Dashboard Kehadiran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f0f4f9;
            color: #1e293b;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            padding: 2rem 1.5rem;
            border-right: 1px solid #e2e8f0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item.active {
            background: #eff6ff;
            color: #2563eb;
            font-weight: 600;
        }

        .logout-item {
            margin-top: auto;
            color: #ef4444;
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-modern {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* 3 Card Layout */
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .grid-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 900px) {
            .grid-stats {
                grid-template-columns: 1fr;
            }

            .grid-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    🎓
                </div>
                <h2>AkademiKu</h2>
            </div>
            <div class="nav-menu">
                <div class="nav-item active" data-page="dashboard"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-item" data-page="absensi"><i class="fas fa-calendar-check"></i> Absensi Saya</div>
                <div class="nav-item" data-page="profil"><i class="fas fa-user"></i> Profil</div>
                <div class="nav-item logout-item" data-page="logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="dashboard-header" id="dynamicHeader"></div>
            <div id="pageContent"></div>
        </main>
    </div>

    <script>
        const mahasiswa = JSON.parse(
            localStorage.getItem("mahasiswaLogin")
        );

        const dataAbsensi =
            JSON.parse(localStorage.getItem("dataAbsensiMahasiswa")) || {};

        const absensi = dataAbsensi[mahasiswa.nim] || {
            totalHadir: 0,
            totalSakit: 0,
            totalIzin: 0,
            totalAlpha: 0,
            totalPertemuan: 0
        };

        if (!mahasiswa) {
            window.location.href = "login.html";
        }

        const persentaseKehadiran =
            absensi.totalPertemuan > 0
                ? ((absensi.totalHadir / absensi.totalPertemuan) * 100).toFixed(1)
                : 0;

        function renderHeader() {
            document.getElementById('dynamicHeader').innerHTML = `
            <div><h1>Halo, ${mahasiswa.nama}</h1><p>Monitoring Absensi Mahasiswa</p></div>
            <div style="text-align:right"><strong>${mahasiswa.nim}</strong><br>${mahasiswa.kelas}</div>
        `;
        }

        function renderDashboard() {
            let matkulList = mahasiswa.matkul
                ? mahasiswa.matkul.map(m => `• ${m}`).join('<br>')
                : 'Belum ada mata kuliah';
            document.getElementById('pageContent').innerHTML = `
            <div class="grid-stats">
                <div class="card-modern stat-card"><div><h4>Total Kehadiran</h4><div class="stat-number">${absensi.totalHadir}</div></div><i class="fas fa-check-circle fa-2x" style="color:#10b981"></i></div>
                <div class="card-modern stat-card"><div><h4>Persentase</h4><div class="stat-number">${persentaseKehadiran}%</div></div><i class="fas fa-chart-pie fa-2x" style="color:#2563eb"></i></div>
                <div class="card-modern stat-card"><div><h4>Mata Kuliah</h4><div class="stat-number">${mahasiswa.matkul.length}</div></div><i class="fas fa-book fa-2x" style="color:#8b5cf6"></i></div>
            </div>
            
            <div class="grid-content">
                <div class="card-modern"><h3 style="margin-bottom:1rem">📈 Grafik Kehadiran</h3><canvas id="chartKehadiran"></canvas></div>
                <div class="card-modern"><h3>📚 Mata Kuliah Saya</h3><p style="margin-top:1rem; line-height:2">${matkulList}</p></div>
            </div>
        `;

            const ctx = document.getElementById('chartKehadiran').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Hadir', 'Izin', 'Sakit', 'Alpha'],
                    datasets: [{ data: [absensi.totalHadir, absensi.totalIzin, absensi.totalSakit, absensi.totalAlpha], backgroundColor: ['#10b981', '#f59e0b', '#8b5cf6', '#ef4444'] }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function renderAbsensi() {
            document.getElementById('pageContent').innerHTML = `<div class="card-modern"><h2>Riwayat Absensi Lengkap</h2><p style="margin-top:10px">Menampilkan seluruh data absensi berdasarkan input dosen.</p></div>`;
        }

        function renderProfil() {
            document.getElementById('pageContent').innerHTML = `
            <div class="card-modern" style="max-width:400px">
                <h2>Profil Mahasiswa</h2>
                <div style="margin-top:1.5rem">
                    <p style="margin-bottom:10px"><strong>Nama:</strong> ${mahasiswa.nama}</p>
                    <p style="margin-bottom:10px"><strong>NIM:</strong> ${mahasiswa.nim}</p>
                    <p style="margin-bottom:10px"><strong>Kelas:</strong> ${mahasiswa.kelas}</p>
                    <p><strong>Persentase Kehadiran:</strong> ${persentaseKehadiran}%</p>
                </div>
            </div>`;
        }

        // Navigasi
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const page = item.getAttribute('data-page');
                if (page === 'dashboard') renderDashboard();
                else if (page === 'absensi') renderAbsensi();
                else if (page === 'profil') renderProfil();
                else if (page === 'logout') {
                    setTimeout(logout, 0);
                    return;
                }
            });
        });

        function logout() {
            if (confirm("Apakah kamu yakin ingin keluar?")) {
                localStorage.removeItem("mahasiswaLogin");
                window.location.href = "login.html";
            }
        }

        renderHeader(); renderDashboard();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkademiKu | Dashboard Kehadiran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f0f4f9;
            color: #1e293b;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            padding: 2rem 1.5rem;
            border-right: 1px solid #e2e8f0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item.active {
            background: #eff6ff;
            color: #2563eb;
            font-weight: 600;
        }

        .logout-item {
            margin-top: auto;
            color: #ef4444;
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-modern {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* 3 Card Layout */
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .grid-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 900px) {
            .grid-stats {
                grid-template-columns: 1fr;
            }

            .grid-content {
                grid-template-columns: 1fr;
            }
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-badge.hadir {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge.izin {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.sakit {
            background: #ede9fe;
            color: #6d28d9;
        }

        .status-badge.alpha {
            background: #fee2e2;
            color: #b91c1c;
        }

        table th,
        table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }

        .profile-card {
            max-width: 500px;
            margin: 20px auto;
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar i {
            color: white;
            font-size: 40px;
        }

        .profile-header h2 {
            margin: 0;
            color: #1e293b;
        }

        .profile-header span {
            color: #64748b;
            font-size: 14px;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .info-item span {
            color: #64748b;
        }

        .info-item strong {
            color: #1e293b;
        }

        .attendance-box {
            margin-top: 20px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .attendance-text {
            font-size: 14px;
            opacity: 0.9;
        }

        .attendance-value {
            font-size: 32px;
            font-weight: bold;
            margin-top: 5px;
        }

        .header-profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .header-left h1 {
            margin: 0;
            font-size: 24px;
            color: #1e293b;
        }

        .header-left p {
            margin: 4px 0 0;
            color: #64748b;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            gap: 12px;
        }

        .info-box {
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 12px;
            text-align: center;
            min-width: 130px;
        }

        .info-box span {
            display: block;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .info-box strong {
            color: #1e293b;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header-profile {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .info-box {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    🎓
                </div>
                <h2>AkademiKu</h2>
            </div>
            <div class="nav-menu">
                <div class="nav-item active" data-page="dashboard"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-item" data-page="absensi"><i class="fas fa-calendar-check"></i> Absensi Saya</div>
                <div class="nav-item" data-page="profil"><i class="fas fa-user"></i> Profil</div>
                <div class="nav-item logout-item" data-page="logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="dashboard-header" id="dynamicHeader"></div>
            <div id="pageContent"></div>
        </main>
    </div>

    <script>
        const mahasiswa = JSON.parse(
            localStorage.getItem("mahasiswaLogin")
        );

        const dataAbsensi =
            JSON.parse(localStorage.getItem("dataAbsensiMahasiswa")) || {};

        const absensi = dataAbsensi[mahasiswa.nim] || {
            totalHadir: 0,
            totalSakit: 0,
            totalIzin: 0,
            totalAlpha: 0,
            totalPertemuan: 0
        };

        if (!mahasiswa) {
            window.location.href = "login.html";
        }

        const persentaseKehadiran =
            absensi.totalPertemuan > 0
                ? ((absensi.totalHadir / absensi.totalPertemuan) * 100).toFixed(1)
                : 0;

        function renderHeader() {
            document.getElementById('dynamicHeader').innerHTML = `
    <div class="header-profile">
        <div class="header-left">
            <div class="avatar">
                <i class="fas fa-user-graduate"></i>
            </div>
            <div>
                <h1>Halo, ${mahasiswa.nama} 👋</h1>
                <p>Selamat datang di Dashboard Mahasiswa</p>
            </div>
        </div>

        <div class="header-right">
            <div class="info-box">
                <span>NIM</span>
                <strong>${mahasiswa.nim}</strong>
            </div>

            <div class="info-box">
                <span>Kelas</span>
                <strong>${mahasiswa.kelas}</strong>
            </div>
        </div>
    </div>
    `;
        }

        function renderDashboard() {
            let matkulList = mahasiswa.matkul
                ? mahasiswa.matkul.map(m => `• ${m}`).join('<br>')
                : 'Belum ada mata kuliah';
            document.getElementById('pageContent').innerHTML = `
            <div class="grid-stats">
                <div class="card-modern stat-card"><div><h4>Total Kehadiran</h4><div class="stat-number">${absensi.totalHadir}</div></div><i class="fas fa-check-circle fa-2x" style="color:#10b981"></i></div>
                <div class="card-modern stat-card"><div><h4>Persentase</h4><div class="stat-number">${persentaseKehadiran}%</div></div><i class="fas fa-chart-pie fa-2x" style="color:#2563eb"></i></div>
                <div class="card-modern stat-card"><div><h4>Mata Kuliah</h4><div class="stat-number">${mahasiswa.matkul.length}</div></div><i class="fas fa-book fa-2x" style="color:#8b5cf6"></i></div>
            </div>
            
            <div class="grid-content">
                <div class="card-modern"><h3 style="margin-bottom:1rem">📈 Grafik Kehadiran</h3><canvas id="chartKehadiran"></canvas></div>
                <div class="card-modern"><h3>📚 Mata Kuliah Saya</h3><p style="margin-top:1rem; line-height:2">${matkulList}</p></div>
            </div>
        `;

            const ctx = document.getElementById('chartKehadiran').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Hadir', 'Izin', 'Sakit', 'Alpha'],
                    datasets: [{ data: [absensi.totalHadir, absensi.totalIzin, absensi.totalSakit, absensi.totalAlpha], backgroundColor: ['#10b981', '#f59e0b', '#8b5cf6', '#ef4444'] }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function renderAbsensi() {
            const riwayat =
                JSON.parse(localStorage.getItem("riwayatAbsensi")) || {};

            const dataMahasiswa = riwayat[mahasiswa.nim] || [];

            let totalHadir = 0;
            let totalIzin = 0;
            let totalSakit = 0;
            let totalAlpha = 0;

            dataMahasiswa.forEach(item => {
                if (item.status === "Hadir") totalHadir++;
                else if (item.status === "Izin") totalIzin++;
                else if (item.status === "Sakit") totalSakit++;
                else if (item.status === "Alpha") totalAlpha++;
            });

            let rows = "";

            if (dataMahasiswa.length === 0) {
                rows = `
            <tr>
                <td colspan="4" style="text-align:center;padding:20px">
                    Belum ada data absensi
                </td>
            </tr>
        `;
            } else {
                rows = dataMahasiswa.map(item => `
            <tr>
                <td>${item.tanggal}</td>
                <td>${item.matkul}</td>
                <td>${item.pertemuan}</td>
                <td>
                    <span class="status-badge ${item.status.toLowerCase()}">
                        ${item.status}
                    </span>
                </td>
            </tr>
        `).join('');
            }

            document.getElementById('pageContent').innerHTML = `
        <div class="grid-stats">
            <div class="card-modern stat-card">
                <div>
                    <h4>Hadir</h4>
                    <div class="stat-number">${totalHadir}</div>
                </div>
                <i class="fas fa-check-circle fa-2x" style="color:#10b981"></i>
            </div>

            <div class="card-modern stat-card">
                <div>
                    <h4>Izin</h4>
                    <div class="stat-number">${totalIzin}</div>
                </div>
                <i class="fas fa-envelope fa-2x" style="color:#f59e0b"></i>
            </div>

            <div class="card-modern stat-card">
                <div>
                    <h4>Sakit</h4>
                    <div class="stat-number">${totalSakit}</div>
                </div>
                <i class="fas fa-notes-medical fa-2x" style="color:#8b5cf6"></i>
            </div>
        </div>

        <div class="card-modern">
            <h2 style="margin-bottom:20px">
                📋 Riwayat Absensi Saya
            </h2>

            <table style="width:100%;border-collapse:collapse">
                <thead>
                    <tr style="background:#f8fafc">
                        <th style="padding:12px">Tanggal</th>
                        <th style="padding:12px">Mata Kuliah</th>
                        <th style="padding:12px">Pertemuan</th>
                        <th style="padding:12px">Status</th>
                    </tr>
                </thead>

                <tbody>
                    ${rows}
                </tbody>
            </table>
        </div>
    `;
        }

        function renderProfil() {
            document.getElementById('pageContent').innerHTML = `
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h2>${mahasiswa.nama}</h2>
        </div>

        <div class="profile-info">
            <div class="info-item">
                <span>NIM</span>
                <strong>${mahasiswa.nim}</strong>
            </div>

            <div class="info-item">
                <span>Kelas</span>
                <strong>${mahasiswa.kelas}</strong>
            </div>

            <div class="info-item">
                <span>Kehadiran</span>
                <strong>${persentaseKehadiran}%</strong>
            </div>
        </div>

        <div class="attendance-box">
            <div class="attendance-text">
                Persentase Kehadiran
            </div>
            <div class="attendance-value">
                ${persentaseKehadiran}%
            </div>
        </div>
    </div>`;
        }

        // Navigasi
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const page = item.getAttribute('data-page');
                if (page === 'dashboard') renderDashboard();
                else if (page === 'absensi') renderAbsensi();
                else if (page === 'profil') renderProfil();
                else if (page === 'logout') {
                    setTimeout(logout, 0);
                    return;
                }
            });
        });

        function logout() {
            if (confirm("Apakah Anda yakin ingin keluar ?")) {
                localStorage.removeItem("mahasiswaLogin");
                window.location.href = "login.html";
            }
        }

        renderHeader(); renderDashboard();
    </script>
</body>

</html>
